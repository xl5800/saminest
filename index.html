<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>华聚</title>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="icon-button back-button" type="button" aria-label="返回">‹</button>
        <a class="brand" href="#home" aria-label="华聚首页">
          <span class="brand-mark">华聚</span>
        </a>
        <nav class="desktop-nav" aria-label="主导航">
          <a href="#home">首页</a>
          <a href="#category/rent">租房</a>
          <a href="#category/wanted">求租</a>
          <a href="#category/used">二手</a>
        </nav>
        <a class="top-action" href="#publish">发布</a>
      </header>

      <main id="app" class="app-main" aria-live="polite"></main>

      <nav class="mobile-nav" aria-label="底部导航">
        <a href="#home" data-route="home">
          <span>⌂</span>
          首页
        </a>
        <a href="#category/all" data-route="category">
          <span>▦</span>
          分类
        </a>
        <a class="publish-tab" href="#publish" data-route="publish">
          <span>＋</span>
          发布
        </a>
        <a href="#messages" data-route="messages">
          <span>✉</span>
          消息
        </a>
        <a href="#me" data-route="me">
          <span>○</span>
          我的
        </a>
      </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
